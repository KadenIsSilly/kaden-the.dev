<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="color-scheme" content="dark">

        <title>Kaden's Portfolio • ERROR 404</title>
        <link rel="icon" type="image/png" href="/assets/images/me.png">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="/styles/main.css">

        <style>
            button {
                padding: 0;
                background: none;
                border: none;
                font-family: 'Instrument Sans', sans-serif;
                font-weight: 500;
                cursor: pointer;
            }

            main {
                display: flex;
                flex-direction: column;
                gap: 12px;
                align-items: center;
                justify-content: center;
                text-align: center;
                min-height: 80vh;
            }

            main h1 {
                font-size: 46px;
                color: var(--accent);
            }

            main .details {
                font-weight: 500;
                font-size: 23px;
                margin-bottom: 10px;
                user-select: none;
            }

            main p {
                font-weight: 400;
                font-size: 16px;
                user-select: none;
            }

            main .container {
                margin-top: 25px;
                display: flex;
                align-items: center;
                gap: 18px;
            }

            main .container .home {
                padding: 10px 12px;
                background-color: var(--accent-dimmed);
                border-radius: 10px;
                font-size: 17px;
                color: var(--sub-text);
                user-select: none;
                text-decoration: none;
                transition: all 0.2s ease;
            } 
            
            main .container .home:hover {
                background-color: var(--accent);
                color: var(--text);
            }

            main .container .back {
                padding: 10px 12px;
                background-color: var(--card-bg2);
                border-radius: 10px;
                font-size: 17px;
                color: var(--sub-text);
                transition: all 0.2s ease;
            } 
            
            main .container .back:hover {
                background-color: var(--card-bg);
                color: var(--text);
            }
        </style>
    </head>

    <body>
        <main>
            <h1>ERROR 404</h1>
            <p class="details">Page Not Found</p>
            <p>Whatever you're looking for it no longer exists, or never did.</p>

            <div class="container">
                <a class="home" href="/">Go Home</a>
                <button class="back" onclick="history.back()" href="/">Go Back</button>
            </div>
        </main>

        <!------------------------------------------------>
        <script>
            window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
        </script>
        <script defer src="/_vercel/insights/script.js"></script>

        <script>
            window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
        </script>
        <script defer src="/_vercel/speed-insights/script.js"></script>
    </body>
</html>
